[build]
command = "pnpm build:postgres"

[build.environment]
NODE_VERSION = "22"

[[edge_functions]]
path = "/*"
function = "research-public-host-guard"

[[headers]]
for = "/"
[headers.values]
Cache-Control = "private, no-store, max-age=0, must-revalidate"

[[headers]]
for = "/breakpoints"
[headers.values]
Cache-Control = "private, no-store, max-age=0, must-revalidate"

[[headers]]
for = "/review/image"
[headers.values]
Cache-Control = "private, no-store, max-age=0, must-revalidate"

[[headers]]
for = "/sw.js"
[headers.values]
Cache-Control = "private, no-store, max-age=0, must-revalidate"
Service-Worker-Allowed = "/"

[[headers]]
for = "/manifest.webmanifest"
[headers.values]
Cache-Control = "private, no-cache, max-age=0, must-revalidate"

[context.deploy-preview.environment]
RESEARCH_PUBLIC_MODE = "true"
NEXT_PUBLIC_IMAGE_REVIEW_ENABLED = "false"
RESEARCH_PUBLIC_IMAGE_REVIEW_ENABLED = "false"
RESEARCH_PUBLIC_IMAGE_UPLOAD_ENABLED = "false"

[context.branch-deploy.environment]
RESEARCH_PUBLIC_MODE = "true"
NEXT_PUBLIC_IMAGE_REVIEW_ENABLED = "false"
RESEARCH_PUBLIC_IMAGE_REVIEW_ENABLED = "false"
RESEARCH_PUBLIC_IMAGE_UPLOAD_ENABLED = "false"
